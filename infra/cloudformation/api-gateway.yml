  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - AuthLinkPostMethod
      - AuthLinkOptionsMethod
      - AuthRefreshPostMethod
      - AuthRefreshOptionsMethod
      - VaultEntriesGetMethod
      - VaultEntriesPostMethod
      - VaultEntriesOptionsMethod
      - VaultEntryByIdGetMethod
      - VaultEntryByIdPutMethod
      - VaultEntryByIdDeleteMethod
      - VaultEntryByIdOptionsMethod
      - VaultEntryUploadPostMethod
      - VaultEntryUploadOptionsMethod
      - VaultEntryDownloadGetMethod
      - VaultEntryDownloadOptionsMethod
      - VaultSearchPostMethod
      - VaultSearchOptionsMethod
      - SessionsGetMethod
      - SessionsOptionsMethod
      - SessionsSyncPostMethod
      - SessionsSyncOptionsMethod
      - SessionByIdGetMethod
      - SessionByIdDeleteMethod
      - SessionByIdOptionsMethod
    Properties:
      RestApiId: !Ref RestApi
      Description: Initial deployment of all 14 endpoints with MOCK integrations

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref StageName
      Description: !Sub "${EnvironmentName} stage"
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: !Ref ThrottleRateLimit
          ThrottlingBurstLimit: !Ref ThrottleBurstLimit
          MetricsEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName

  ApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: !Sub "${ProjectPrefix}-${EnvironmentName}-usage-plan"
      Description: "Stage-wide throttle (per-user throttling needs API keys — follow-up)"
      ApiStages:
        - ApiId: !Ref RestApi
          Stage: !Ref ApiStage
      Throttle:
        RateLimit: !Ref ThrottleRateLimit
        BurstLimit: !Ref ThrottleBurstLimit

Outputs:
  ApiId:
    Description: REST API ID
    Value: !Ref RestApi
    Export:
      Name: !Sub "${ProjectPrefix}-${EnvironmentName}-api-id"

  ApiRootResourceId:
    Description: Root resource ID (for downstream stacks adding child resources)
    Value: !GetAtt RestApi.RootResourceId
    Export:
      Name: !Sub "${ProjectPrefix}-${EnvironmentName}-api-root-resource-id"

  ApiUrl:
    Description: Base URL for the deployed API
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
    Export:
      Name: !Sub "${ProjectPrefix}-${EnvironmentName}-api-url"

  CognitoAuthorizerId:
    Description: Cognito authorizer ID (for downstream stacks attaching new methods)
    Value: !Ref CognitoAuthorizer
    Export:
      Name: !Sub "${ProjectPrefix}-${EnvironmentName}-api-cognito-authorizer-id"
