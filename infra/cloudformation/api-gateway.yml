AWSTemplateFormatVersion: "2010-09-09"
Description: Solo Vault REST API Gateway with Cognito authorizer (INFRA-3)

Parameters:
  ProjectPrefix:
    Type: String
    AllowedPattern: "^[a-z0-9-]+$"
  EnvironmentName:
    Type: String
    AllowedPattern: "^[a-z0-9-]+$"
  StageName:
    Type: String
    Default: prod
    AllowedPattern: "^[a-z0-9]+$"
  ThrottleRateLimit:
    Type: Number
    Default: 17
    Description: Steady-state requests per second (~1000/min). Stage-wide; per-user throttling needs API keys (follow-up).
  ThrottleBurstLimit:
    Type: Number
    Default: 100
    Description: Burst capacity for short spikes.

Resources:
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectPrefix}-${EnvironmentName}-api"
      Description: Solo Vault REST API — vault entries, files, sessions, auth
      EndpointConfiguration:
        Types: [REGIONAL]
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: aws-sdk-js-v3

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub "${ProjectPrefix}-${EnvironmentName}-cognito-authorizer"
      RestApiId: !Ref RestApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - Fn::ImportValue: !Sub "${ProjectPrefix}-${EnvironmentName}-cognito-user-pool-arn"

  AuthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: auth

  AuthLinkResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref AuthResource
      PathPart: link

  AuthRefreshResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref AuthResource
      PathPart: refresh

  VaultResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: vault

  VaultEntriesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref VaultResource
      PathPart: entries

  VaultEntryByIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref VaultEntriesResource
      PathPart: "{id}"

  VaultEntryUploadResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref VaultEntryByIdResource
      PathPart: upload

  VaultEntryDownloadResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref VaultEntryByIdResource
      PathPart: download

  VaultSearchResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref VaultResource
      PathPart: search

  SessionsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: sessions

  SessionsSyncResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref SessionsResource
      PathPart: sync

  SessionByIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref SessionsResource
      PathPart: "{id}"

  # Auth endpoints have AuthorizationType NONE because they exchange a
  # Supabase JWT (or refresh token) for Cognito tokens — there is no
  # Cognito session yet to authorize against.
  AuthLinkPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref AuthLinkResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 501}'
        IntegrationResponses:
          - StatusCode: "501"
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: '{"error":{"code":"NOT_IMPLEMENTED","message":"Endpoint not yet implemented (INFRA-3 placeholder)"}}'
      MethodResponses:
        - StatusCode: "501"
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true

  AuthLinkOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref AuthLinkResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: "200"
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
      MethodResponses:
        - StatusCode: "200"
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true

  AuthRefreshPostMethod:
