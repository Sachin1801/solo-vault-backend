AWSTemplateFormatVersion: "2010-09-09"
Description: Solo Vault Cognito User Pool for vault API authentication (INFRA-2)

Parameters:
  ProjectPrefix:
    Type: String
    AllowedPattern: "^[a-z0-9-]+$"
  EnvironmentName:
    Type: String
    AllowedPattern: "^[a-z0-9-]+$"

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectPrefix}-${EnvironmentName}-user-pool"

      # Server-side only — no self-signup, no hosted UI
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

      # email is the unique identifier; sub is auto-generated by Cognito
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email

      # Supabase sub stored as a custom attribute for user lookup on /auth/link
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: supabase_sub
          AttributeDataType: String
          Required: false
          Mutable: true
          StringAttributeConstraints:
            MaxLength: "256"

      # Minimal password policy — passwords are set server-side and never user-facing
      Policies:
        PasswordPolicy:
          MinimumLength: 20
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 1

      # Token expiry per spec: access 1hr, refresh 30 days
      UserPoolAddOns:
        AdvancedSecurityMode: "OFF"

      MfaConfiguration: "OFF"

      UserPoolTags:
        Project: !Ref ProjectPrefix
        Environment: !Ref EnvironmentName
        ManagedBy: aws-sdk-js-v3

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectPrefix}-${EnvironmentName}-app-client"
      UserPoolId: !Ref CognitoUserPool

      # No client secret — Lambda calls use IAM-signed AdminInitiateAuth, not client secret
      GenerateSecret: false

      # ADMIN_NO_SRP_AUTH for AdminInitiateAuth; REFRESH_TOKEN_AUTH for /auth/refresh
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

      # Token expiry
      AccessTokenValidity: 60          # minutes → 1 hour
      IdTokenValidity: 60              # minutes → 1 hour
      RefreshTokenValidity: 43200      # minutes → 30 days
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: minutes

      # No OAuth flows — pure server-side token exchange
      AllowedOAuthFlowsUserPoolClient: false

      PreventUserExistenceErrors: ENABLED

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub "${ProjectPrefix}-${EnvironmentName}-cognito-user-pool-id"

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt CognitoUserPool.Arn
    Export:
      Name: !Sub "${ProjectPrefix}-${EnvironmentName}-cognito-user-pool-arn"

  AppClientId:
    Description: Cognito App Client ID
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub "${ProjectPrefix}-${EnvironmentName}-cognito-app-client-id"
